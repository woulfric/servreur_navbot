<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TB4 Cockpit - Mapping</title>
    
    <script src="https://code.createjs.com/1.0.0/easeljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.9/lib/eventemitter2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1.4.1/build/roslib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ros2d@0.10.0/build/ros2d.min.js"></script>

    <style>
        /* --- STYLE GLOBAL --- */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #0f0f0f; 
            color: #eee; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        /* --- PANNEAU GAUCHE (CARTE) --- */
        .left-panel {
            flex: 1; 
            display: flex; 
            flex-direction: column;
            border-right: 2px solid #333;
            background: #111;
            position: relative;
        }

        .map-header {
            padding: 15px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            color: #00ffcc;
            font-family: monospace;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        #map-container {
            flex: 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #111;
        }

        #ros-map {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- PANNEAU DROITE (COMMANDES) --- */
        .right-panel {
            width: 350px;
            background: #181818;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        h3 { 
            margin: 0 0 20px 0; 
            font-weight: 300; 
            letter-spacing: 3px; 
            text-align: center; 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px;
            text-transform: uppercase;
        }

        .status-card {
            background: #252525;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #f39c12;
            margin-bottom: 20px;
        }

        .status-label {
            font-size: 10px; 
            color: #888; 
            margin-bottom: 5px; 
            text-transform: uppercase;
        }

        .status-val {
            font-size: 16px; 
            font-family: monospace; 
            color: #f39c12;
            font-weight: bold;
        }

        /* --- GRILLE DE CONTROLE --- */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        button.ctrl-btn { 
            background: #333; 
            border: 1px solid #444; 
            color: white; 
            padding: 20px; 
            border-radius: 8px; 
            font-size: 20px; 
            cursor: pointer;
            transition: background 0.1s;
        }
        
        button.ctrl-btn:active { 
            background: #555; 
            transform: scale(0.95); 
        }

        /* --- BOUTONS SPECIAUX --- */
        .reset-btn {
            background: #d35400;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            margin-top: auto;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .reset-btn:active { background: #e67e22; }

        .menu-btn {
            padding: 15px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .menu-btn:hover { background: #2c3e50; }

        .info-text {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin: 10px 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="map-header">
            <span>SLAM VISUALIZER</span>
            <span id="map-info" style="color: #666;">WAITING DATA...</span>
        </div>
        <div id="map-container">
            <div id="ros-map"></div>
        </div>
    </div>

    <div class="right-panel">
        <h3>MAPPING MODE</h3>

        <div class="status-card">
            <div class="status-label">Bridge Connection</div>
            <div id="status" class="status-val">CONNECTING...</div>
        </div>

        <p class="info-text">
            Utilisez les fleches pour scanner la zone.<br>
            Le SLAM generera la carte automatiquement.
        </p>

        <div class="controls-grid">
            <button class="ctrl-btn" style="grid-column: 2;" onmousedown="move(1,0)" onmouseup="stop()" onmouseleave="stop()">▲</button>
            <button class="ctrl-btn" style="grid-column: 1; grid-row: 2;" onmousedown="move(0,1)" onmouseup="stop()" onmouseleave="stop()">◀</button>
            <button class="ctrl-btn" style="grid-column: 2; grid-row: 2;" onmousedown="move(-1,0)" onmouseup="stop()" onmouseleave="stop()">▼</button>
            <button class="ctrl-btn" style="grid-column: 3; grid-row: 2;" onmousedown="move(0,-1)" onmouseup="stop()" onmouseleave="stop()">▶</button>
        </div>

        <button class="reset-btn" onclick="resetMap()">RESET MAP</button>
        <button class="menu-btn" onclick="window.location.href='index.html'">RETOUR MENU</button>
    </div>

<script>
        let ros = null; 
        let viewer = null;
        let gridClient = null;

        // --- 1. INITIALISATION SYSTEME ---
        async function startSystem() {
            try {
                // On demande la config au serveur
                const response = await fetch(window.location.origin + '/api/config');
                const config = await response.json();

                console.log("Config reçue du serveur :", config);

                let rosUrl = '';

                // CAS 1 : Ton fichier config.js renvoie ROSBRIDGE_URL (ce que tu as maintenant)
                if (config.ROSBRIDGE_URL) {
                    rosUrl = config.ROSBRIDGE_URL;
                } 
                // CAS 2 : Sécurité si jamais tu changes de format un jour
                else if (config.robotIP) {
                    rosUrl = `ws://${config.robotIP}:${config.rosPort || '9090'}`;
                } 
                // CAS 3 : Fallback local
                else {
                    rosUrl = 'ws://' + window.location.hostname + ':9090';
                }

                console.log('Connexion vers :', rosUrl);
                connectToRos(rosUrl);

            } catch (err) {
                console.error("Erreur config, passage en localhost", err);
                connectToRos('ws://' + window.location.hostname + ':9090');
            }
        }

        function connectToRos(url) {
            ros = new ROSLIB.Ros({
                url: url
            });

            ros.on('connection', () => {
                document.getElementById('status').innerText = "ONLINE";
                document.getElementById('status').style.color = "#2ecc71";
                document.querySelector('.status-card').style.borderColor = "#2ecc71";
                
                setTimeout(initMap, 500);
            });

            ros.on('error', (err) => {
                document.getElementById('status').innerText = "OFFLINE";
                document.getElementById('status').style.color = "#e74c3c";
                document.querySelector('.status-card').style.borderColor = "#e74c3c";
                console.log("Erreur de connexion ROS :", err);
            });
        }

        // --- 2. GESTION DE LA CARTE ---
        function initMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '<div id="ros-map"></div>';

            viewer = new ROS2D.Viewer({
                divID: 'ros-map',
                width: container.offsetWidth,
                height: container.offsetHeight,
                background: '#111111'
            });

            gridClient = new ROS2D.OccupancyGridClient({
                ros: ros,
                rootObject: viewer.scene,
                continuous: true 
            });

            gridClient.on('change', () => {
                document.getElementById('map-info').innerText = "GRID RECEIVED";
                viewer.scaleToDimensions(gridClient.currentGrid.width, gridClient.currentGrid.height);
                viewer.shift(gridClient.currentGrid.pose.position.x, gridClient.currentGrid.pose.position.y);
            });
        }

        function resetMap() {
            if (!ros) return;
            const sysCommand = new ROSLIB.Topic({
                ros: ros,
                name: '/syscommand',
                messageType: 'std_msgs/String'
            });
            const resetMsg = new ROSLIB.Message({ data: 'reset' });
            sysCommand.publish(resetMsg);
            setTimeout(() => window.location.reload(), 500);
        }

        // --- 3. PILOTAGE FLUIDE ---
        let moveInterval = null;

        function move(lin, ang) {
            if (moveInterval) return;
            const url = window.location.origin + '/api/move';
            
            const sendCommand = () => {
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ linear: lin * 0.2, angular: ang * 0.8 })
                }).catch(e => console.error(e));
            };

            sendCommand();
            moveInterval = setInterval(sendCommand, 200);
        }

        function stop() {
            if (moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
            const url = window.location.origin + '/api/stop';
            fetch(url, { method: 'POST' }).catch(e => console.error(e));
        }

        startSystem();
    </script>
</body>
</html>
